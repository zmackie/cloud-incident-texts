name: Crawl Incidents

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "crawl"
        type: choice
        options:
          - crawl
          - monitor-once
      refresh:
        description: "Re-fetch incident list even if cached (crawl mode only)"
        required: false
        default: false
        type: boolean
      vision:
        description: "Enable Claude vision OCR fallback (requires ANTHROPIC_API_KEY secret)"
        required: false
        default: true
        type: boolean
      workers:
        description: "Parallel workers for crawl (default: 5)"
        required: false
        default: "5"
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Check API key (vision mode)
        if: inputs.vision
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::vision=true but ANTHROPIC_API_KEY secret is not set."
            echo "::error::Add it at: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "ANTHROPIC_API_KEY is set."

      - name: Run crawl
        if: inputs.mode == 'crawl'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/crawl.py \
            ${{ inputs.refresh && '--refresh' || '' }} \
            ${{ inputs.vision && '--vision' || '' }} \
            --workers ${{ inputs.workers }}

      - name: Run monitor (one-shot)
        if: inputs.mode == 'monitor-once'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/monitor.py \
            --once \
            ${{ inputs.vision && '--vision' || '' }}

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "chore: crawl update $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

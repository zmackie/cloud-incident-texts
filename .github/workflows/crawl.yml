name: Crawl & Analyze Incidents

on:
  # ── Manual trigger ──────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "crawl"
        type: choice
        options:
          - crawl
          - monitor-once
      refresh:
        description: "Re-fetch incident list even if cached (crawl mode only)"
        required: false
        default: false
        type: boolean
      vision:
        description: "Enable Claude vision OCR fallback"
        required: false
        default: false
        type: boolean
      workers:
        description: "Parallel crawl workers (default: 5)"
        required: false
        default: "5"
        type: string
      reanalyze:
        description: "Re-analyze all incidents even if already analyzed"
        required: false
        default: false
        type: boolean
      analyze_workers:
        description: "Parallel analysis workers (default: 3)"
        required: false
        default: "3"
        type: string

  # ── Scheduled trigger ───────────────────────────────────────────────────
  # Runs daily at 06:00 UTC: check for new incidents, crawl them, analyze.
  schedule:
    - cron: '0 6 * * *'

jobs:
  crawl-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push crawled articles + analysis back to repo

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      # ── Fetch MITRE ATT&CK cloud technique data ───────────────────────────
      # Writes data/mitre_attack_cloud.json if it doesn't already exist.
      # Use --force to refresh when a new ATT&CK version is released.
      - name: Fetch MITRE ATT&CK data
        run: uv run python scripts/fetch_attack_data.py

      # ── Resolve effective run mode ─────────────────────────────────────────
      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "run_mode=monitor-once" >> "$GITHUB_OUTPUT"
          else
            echo "run_mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          fi

      # ── Initial full crawl (manual only) ──────────────────────────────────
      - name: Run full crawl
        if: steps.mode.outputs.run_mode == 'crawl'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/crawl.py \
            ${{ inputs.refresh && '--refresh' || '' }} \
            ${{ inputs.vision && '--vision' || '' }} \
            --workers ${{ inputs.workers || '5' }}

      # ── Daily incremental monitor ──────────────────────────────────────────
      - name: Run monitor (one-shot)
        if: steps.mode.outputs.run_mode == 'monitor-once'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/monitor.py \
            --once \
            ${{ (inputs.vision == true) && '--vision' || '' }}

      # ── ATT&CK analysis ───────────────────────────────────────────────────
      # Reads every crawled incident in data/articles/ and calls Claude to
      # extract a structured MITRE ATT&CK mapping.  Skips incidents that
      # already have an attack_analysis.json (idempotent).
      # Also writes scenario_template.json per incident (gitignored).
      - name: Analyze incidents
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          uv run python scripts/analyze.py \
            ${{ (inputs.reanalyze == true) && '--reanalyze' || '' }} \
            --workers ${{ inputs.analyze_workers || '3' }}

      # ── Commit data back to the repo ──────────────────────────────────────
      # Commits:
      #   data/articles/   - crawled markdown corpus
      #   data/analysis/   - ATT&CK analysis JSON (scenario_template.json excluded by .gitignore)
      #   data/mitre_attack_cloud.json
      #   data/incidents.json, data/crawl_summary.json, etc.
      - name: Commit data back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update incident corpus and ATT&CK analysis [skip ci]"
            git push
          fi

      # ── Trigger site deploy ───────────────────────────────────────────────
      # After committing new analysis data, kick off the site build + deploy.
      # Uses a repository_dispatch event so the deploy workflow can also be
      # triggered independently (e.g. after a site code change).
      - name: Trigger site deployment
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            -f event_type=analysis-updated \
            -f '{"client_payload": {"run_id": "${{ github.run_id }}"}}'

      # ── Artifact backup (30-day retention) ───────────────────────────────
      - name: Upload data outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: incident-data-${{ github.run_id }}
          path: data/
          if-no-files-found: ignore
          retention-days: 30

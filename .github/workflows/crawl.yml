name: Crawl Incidents

on:
  # Manual one-off runs
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "crawl"
        type: choice
        options:
          - crawl
          - monitor-once
      refresh:
        description: "Re-fetch incident list even if cached (crawl mode only)"
        required: false
        default: false
        type: boolean
      vision:
        description: "Enable Claude vision OCR fallback (requires ANTHROPIC_API_KEY secret)"
        required: false
        default: true
        type: boolean
      workers:
        description: "Parallel workers for crawl (default: 5)"
        required: false
        default: "5"
        type: string

  # Scheduled incremental monitoring — checks for new incidents every 6 hours
  schedule:
    - cron: "0 */6 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so we can push back
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync
          # Install heavy OCR stack only when vision is enabled
          if [ "${{ steps.params.outputs.vision }}" = "true" ]; then
            uv sync --extra ocr
          fi

      # Cache Hugging Face model weights so we don't re-download on every run
      - name: Cache HuggingFace models
        if: steps.params.outputs.vision == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-chandra-ocr-2

      # Normalise inputs — scheduled runs always do monitor-once with vision on
      - name: Resolve run parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=monitor-once"   >> $GITHUB_OUTPUT
            echo "vision=true"         >> $GITHUB_OUTPUT
            echo "refresh=false"       >> $GITHUB_OUTPUT
            echo "workers=5"           >> $GITHUB_OUTPUT
          else
            echo "mode=${{ inputs.mode }}"       >> $GITHUB_OUTPUT
            echo "vision=${{ inputs.vision }}"   >> $GITHUB_OUTPUT
            echo "refresh=${{ inputs.refresh }}" >> $GITHUB_OUTPUT
            echo "workers=${{ inputs.workers }}" >> $GITHUB_OUTPUT
          fi

      - name: Check API keys (vision mode)
        if: steps.params.outputs.vision == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ok=true
          if [ -z "$HF_TOKEN" ]; then
            echo "::warning::HF_TOKEN secret not set — Chandra OCR model download may fail or be rate-limited."
            echo "::warning::Add HF_TOKEN at: Settings → Secrets and variables → Actions → New repository secret"
          else
            echo "HF_TOKEN is set."
          fi
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set — Claude vision fallback will be skipped."
          else
            echo "ANTHROPIC_API_KEY is set."
          fi
          if [ -z "$HF_TOKEN" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::vision=true but neither HF_TOKEN nor ANTHROPIC_API_KEY is set. At least one is required."
            exit 1
          fi

      - name: Run crawl
        if: steps.params.outputs.mode == 'crawl'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python scripts/crawl.py \
            ${{ steps.params.outputs.refresh == 'true' && '--refresh' || '' }} \
            ${{ steps.params.outputs.vision == 'true' && '--vision' || '' }} \
            --workers ${{ steps.params.outputs.workers }}

      - name: Run monitor (one-shot)
        if: steps.params.outputs.mode == 'monitor-once'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          uv run python scripts/monitor.py \
            --once \
            ${{ steps.params.outputs.vision == 'true' && '--vision' || '' }}

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "chore: crawl update $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

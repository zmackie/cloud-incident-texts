name: PR Preview Build

on:
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - 'scripts/build_site_data.py'
      - 'data/**'
      - '.github/workflows/pr-preview.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        working-directory: site
        run: npm install

      - name: Build site data
        run: |
          mkdir -p site/public/data/incidents
          uv run python scripts/build_site_data.py --output-dir site/public/data

      - name: Build Astro site
        working-directory: site
        run: npm run build

      - name: Upload built site as artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: site-preview-pr-${{ github.event.pull_request.number }}
          path: site/dist
          retention-days: 14

      - name: Comment preview link on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            ### Site preview built

            The Astro build succeeded for this PR. GitHub Pages only serves a single
            deployment per repo, so a live URL isn't published for PRs — but the
            built site is attached as an artifact you can open locally:

            **[Download preview artifact](${{ steps.upload.outputs.artifact-url }})**

            Unzip and serve:
            ```
            cd site-preview-pr-${{ github.event.pull_request.number }}
            npx http-server -p 4321
            open http://localhost:4321/cloud-incident-texts/
            ```

            If you'd like true live preview URLs per PR, the cleanest path is
            connecting this repo to Cloudflare Pages or Netlify — both give
            zero-config per-PR preview domains.
